<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اتصل بي</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',Tahoma;
  background:linear-gradient(135deg,#0a3d62,#3c6382,#1e90ff);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:#fff;
  direction:rtl;
  overflow:hidden;
}

/* background animation */
body::before{
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background:radial-gradient(circle,#ffffff22 10%,transparent 10%);
  background-size:50px 50px;
  animation:move 20s linear infinite;
}
@keyframes move{
  from{transform:translate(0,0)}
  to{transform:translate(-50px,-50px)}
}

.container{
  position:relative;
  text-align:center;
  background:rgba(255,255,255,0.1);
  padding:40px 30px;
  border-radius:25px;
  backdrop-filter:blur(15px);
  box-shadow:0 15px 40px rgba(0,0,0,0.4);
  width:280px;
  animation:fadeIn 1s ease;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}

h1{
  margin-bottom:10px;
  font-size:26px;
}

.sub{
  font-size:14px;
  opacity:.8;
  margin-bottom:25px;
}

.btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  margin:12px 0;
  padding:14px;
  border-radius:50px;
  text-decoration:none;
  font-size:17px;
  font-weight:bold;
  transition:0.3s;
  position:relative;
  overflow:hidden;
}

/* shine effect */
.btn::before{
  content:"";
  position:absolute;
  width:0%;
  height:100%;
  background:rgba(255,255,255,0.3);
  left:0;
  top:0;
  transition:0.4s;
}
.btn:hover::before{
  width:100%;
}

.call{
  background:#1e90ff;
  color:#fff;
}

.whatsapp{
  background:#25D366;
  color:#fff;
}

.btn:hover{
  transform:scale(1.07);
  box-shadow:0 8px 20px rgba(0,0,0,0.4);
}

.footer{
  margin-top:20px;
  font-size:12px;
  opacity:.6;
}
</style>
</head>

<body>

<div class="container">
  <h1>اتصل بي</h1>
  <div class="sub">Contact Me</div>

  <a class="btn call" href="tel:+9647735585980">
    📞 اتصال هاتفي
  </a>

  <a class="btn whatsapp" href="https://wa.me/9647735585980">
    💬 واتساب
  </a>

  <div class="footer">جاهز للتواصل في أي وقت</div>
</div>

</body>
</html>
