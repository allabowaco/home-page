<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شركة اللبوة للصرافة</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Cairo',sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#1e3c72,#2a5298);
  direction:rtl;
  overflow:hidden;
  color:#fff;
}

/* animated blue pattern */
body::before{
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background:radial-gradient(circle,#ffffff10 10%,transparent 10%);
  background-size:50px 50px;
  animation:move 20s linear infinite;
}

@keyframes move{
  from{transform:translate(0,0);}
  to{transform:translate(-50px,-50px);}
}

/* main container */
.container{
  position:relative;
  width:90%;
  max-width:400px;
  padding:40px 30px;
  border-radius:25px;
  text-align:center;

  /* glass effect */
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,0.2);

  /* neumorphism shadows */
  box-shadow:
    10px 10px 30px rgba(0,0,0,0.5),
    -10px -10px 30px rgba(255,255,255,0.05);

  animation:fadeIn 1s ease;
  transition:0.5s;
}

.container:hover{
  transform:translateY(-5px) scale(1.02);
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(30px);}
  to{opacity:1; transform:translateY(0);}
}

/* logo */
.logo{
  font-size:50px;
  margin-bottom:15px;
}

/* title */
h1{
  font-size:24px;
  font-weight:700;
}

.sub{
  font-size:14px;
  opacity:.7;
  margin:10px 0 25px;
}

/* buttons */
.btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  padding:14px;
  margin:10px 0;
  border-radius:50px;
  text-decoration:none;
  font-size:16px;
  font-weight:600;
  position:relative;
  overflow:hidden;
  transition:0.3s;
}

/* shine effect */
.btn::before{
  content:"";
  position:absolute;
  width:0%;
  height:100%;
  background:rgba(255,255,255,0.25);
  left:0;
  top:0;
  transition:0.4s;
}
.btn:hover::before{
  width:100%;
}
.btn:hover{
  transform:translateY(-3px) scale(1.05);
}

/* individual button colors */
.call{
  background:linear-gradient(135deg,#1e90ff,#4facfe);
  color:#fff;
}
.whatsapp{
  background:linear-gradient(135deg,#25D366,#128C7E);
  color:#fff;
}
.location{
  background:linear-gradient(135deg,#2980b9,#6dd5fa);
  color:#fff;
}
.wifi{
  background:linear-gradient(135deg,#f39c12,#f1c40f);
  color:#fff;
}

/* footer */
.footer{
  margin-top:18px;
  font-size:12px;
  opacity:.6;
}

/* responsive */
@media(max-width:420px){
  h1{font-size:20px}
  .btn{font-size:14px;padding:12px}
  .logo{font-size:40px}
}
</style>
</head>

<body>

<div class="container">

  <div class="logo">💱</div>

  <h1>شركة اللبوة للصرافة</h1>
  <div class="sub">Al Labwa Exchange Company</div>

  <!-- Buttons -->
  <a class="btn call" href="tel:+9647735585980">
    📞 اتصال مباشر
  </a>

  <a class="btn whatsapp" href="https://wa.me/9647735585980">
    💬 تواصل واتساب
  </a>

  <a class="btn location" href="https://www.google.com/maps/place/%D8%B4%D8%B1%D9%83%D8%A9+%D8%A7%D9%84%D9%84%D8%A8%D9%88%D8%A9+%D9%84%D9%84%D8%B5%D8%B1%D8%A7%D9%81%D8%A9+%D9%81%D8%B1%D8%B9+%D8%A7%D9%84%D8%B9%D8%A7%D9%85%D8%B1%D9%8A%D8%A9%E2%80%AD/@33.2979026,44.2984106,18z/data=!4m6!3m5!1s0x1559d7ffb077927f:0x49dbf621b7a4f1f6!8m2!3d33.2977691!4d44.2987913!16s%2Fg%2F11y_k8k97j?entry=ttu&g_ep=EgoyMDI2MDMxNS4wIKXMDSoASAFQAw%3D%3D">
    📍 موقع الشركة
  </a>

  <a class="btn wifi" href="WIFI:T:WPA;S:allabowa;P:88888888;;">
    📶 اتصال واي فاي
  </a>

  <div class="footer">
    خدمة تحويل العملات بسرعة وأمان
  </div>

</div>

</body>
</html>
